<!DOCTYPE html>
<html>
<head>
    <title>Barcode Scan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Scan Barcode for Product ID: {{ product_id }}</h1>
    <img src="{{ barcode_url }}" alt="Barcode"/>
    <input type="text" id="barcode-input" autofocus style="position:absolute; top:-100px;"/>

    <!-- Modal -->
    <div class="modal fade" id="scanModal" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalLabel">Barcode Scanned</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    Barcode: <span id="barcode-result"></span> has been scanned.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#barcode-input').on('keypress', function(e) {
                if (e.which == 13) {  // Enter key pressed
                    var barcode = $(this).val();
                    $('#barcode-result').text(barcode);
                    $('#scanModal').modal('show');
                    $(this).val(''); // clear the input for next scan
                    return false; // Prevent form submission
                }
            });
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
