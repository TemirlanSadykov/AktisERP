{% extends "base.html" %}

{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the order "{{ order.order_number }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  
  <a href="{% url 'order_detail' order.pk %}">Cancel</a> |
  <a href="{% url 'order_list' %}">Back to Order List</a>
{% endblock %}
