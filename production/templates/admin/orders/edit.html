{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Edit Order:" %} {{ order.order_number }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Update" %}</button>
  </form>
  <a href="{% url 'order_detail' order.pk %}">{% trans "Cancel" %}</a> |
  <a href="{% url 'order_list' %}">{% trans "Back" %}</a>
{% endblock %}
