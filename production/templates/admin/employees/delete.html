{% extends "base.html" %}
{% load i18n %}
{% block content %}

    {% csrf_token %}
    <p>{% trans "Are you sure you want to delete %(full_name)s?" %}</p>
    <button type="submit">{% trans "Confirm" %}</button>
    <a href="{% url 'employee_list' %}">{% trans "Cancel" %}</a>
  </form>
{% endblock %}
