{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-container">
  <h2 class="form-heading">{% trans "Client Details:" %} {{ client.name }}</h2>
  <div class="details">
    <p><strong>{% trans "Contact Info:" %}</strong> {{ client.contact_info }}</p>
  </div>

  <div class="form-actions">
    <a href="{% url 'client_edit' client.pk %}" class="btn edit-btn">{% trans "Edit" %}</a>
    <a href="javascript:;" onclick="confirmDelete()" class="btn delete-btn">{% trans "Delete" %}</a>
    <a href="{% url 'client_list' %}" class="btn back-btn">{% trans "Back" %}</a>
  </div>

  <form id="deleteForm" action="{% url 'client_delete' client.pk %}" method="post" style="display:none;">
    {% csrf_token %}
  </form>
</div>

<script>
  function confirmDelete() {
    if (confirm("{% trans 'Are you sure you want to delete this client?' %}")) {
      document.getElementById('deleteForm').submit();
    }
  }
</script>
{% endblock %}
