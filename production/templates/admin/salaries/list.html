{% extends "base.html" %}

{% block content %}
<h2>{% trans "Salaries" %}</h2>
<form method="get">
  {{ form.as_p }}
  <button type="submit">{% trans "Filter" %}</button>
</form>

<table>
  <tr>
    <th>{% trans "Employee" %}</th>
    <th>{% trans "Salary" %} {% trans "Som" %}</th>
  </tr>
  {% for user, salary in salaries.items %}
  <tr>
    <td>
      <a href="{% url 'salary_detail' employee_id=user.id %}?start_date={{ request.GET.start_date }}&end_date={{ request.GET.end_date }}">
        {{ user.user.get_full_name }}
      </a>
    </td>
    <td>{{ salary|floatformat:2 }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
