{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Login" %} - Aktis ERP</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/login_style.css' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body>

<div class="container">
    <div class="login-container">
        <h2 class="form-heading">{% trans "Login" %}</h2> 
        <form method="post" action="{% url 'login' %}" class="login-form">  
            {% csrf_token %}  
            {{ form.as_p }} 

            <button type="submit" class="btn btn-primary">{% trans "Login" %}</button> 
        </form>

        {% if form.errors %}  
            <p class="error-message">{% trans "Your username and password didn't match. Please try again." %}</p> 
        {% endif %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
