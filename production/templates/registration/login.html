{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Login" %} - Aktis ERP</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/login_style.css' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 login-con">
        <div class="row">
            <div class="col-md-6 d-flex justify-content-center align-items-center ">
                <div class="illustration text-center">
                    <img src="{% static 'img/loginLogo.png' %}" alt="Illustration" class="img-fluid">
                </div>
                <div class="background-image"></div>
                <div class="background-image1"></div>
            </div>
            <div class="col-md-5">
                <div class="login-form p-4">
                    <h2  class="form-heading headingData">{% trans "Login" %}</h2> 
                    <form method="post" action="{% url 'login' %}" class="login-form">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button type="submit" class="btn btn-primary btn-block button-height">{% trans "Login" %}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

 <!-- added -->

<script src="https://kit.fontawesome.com/a076d05399.js"></script>
<!-- <script src="script.js"></script> -->
</body>
</html>
