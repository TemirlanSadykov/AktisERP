{% block content %}
  <h2>Login</h2>
  <form method="post" action="{% url 'login' %}">  <!-- The form submits to the URL named 'login' -->
    {% csrf_token %}  <!-- CSRF token for security -->
    {{ form.as_p }}  <!-- Render form fields -->

    <button type="submit">Login</button>
  </form>

  {% if form.errors %}  <!-- Display form errors if there are any -->
    <p>Your username and password didn't match. Please try again.</p>
  {% endif %}

{% endblock %}
