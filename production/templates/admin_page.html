{% extends "base.html" %}
{% load i18n %}
{% load static %}
{% block content %}

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <button class="navbar-toggler" type="button" id="menu-toggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <h4 style="color: #232323;">{% trans 'Admin Dashboard' %}</h4>
  <div class="collapse navbar-collapse" id="navbarSupportedContent" style="display: inline;">
    <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
      <li class="nav-item dropdown" style="margin: auto;">
        {{ request.user.username }}
      </li>
      <li class="nav-item dropdown">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <a class="dropdown-item">
            <button type="submit" class="btn btn-outline-custom">{% trans 'Logout' %}</button>
          </a>
        </form>
      </li>
    </ul>
  </div>
</nav>
    <div class="container-fluid ">
      <div class="row mt-4">
        <div class="col-md-6 col-sm-6 mb-4">
          <a href="{% url 'technologist_page' %}" style="text-decoration: none;">

          <div class="card text-black h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title">{% trans 'Technologist' %}</h5>

                </div>
                <div class="icon">
                  <img src="{% static 'img/tech.png' %}" alt="" style="width: 100px;">
                </div>
              </div>
            </div>
          </div>
        </a>

        </div>
        <div class="col-md-6 col-sm-6 mb-4">
          <a href="{% url 'cutter_page' %}" style="text-decoration: none;">

          <div class="card text-black h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title">{% trans 'Cutter' %}</h5>
                
                </div>
                <div class="icon">
                  <img src="{% static 'img/cutter.png' %}" alt="" style="width: 100px;">
                </div>
              </div>
            </div>
          </div>
        </a>
        </div>
      </div>
      <div class="row mt-4">

        <div class="col-md-6 col-sm-6 mb-4">
          <a href="{% url 'qc_page' %}" style="text-decoration: none;">

          <div class="card text-black h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title">{% trans 'QC (Quality control)' %}</h5>
                </div>
                <div class="icon">
                  <img src="{% static 'img/qc.png' %}" alt="" style="width: 100px;">
                </div>
              </div>
            </div>
          </div>
        </a>

        </div>

        <div class="col-md-6 col-sm-6 mb-4">
          <a href="{% url 'packer_page' %}" style="text-decoration: none;">

          <div class="card text-black h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title">{% trans 'Packer' %}</h5>
                </div>
                <div class="icon">
                  <img src="{% static 'img/packer.png' %}" alt="" style="width: 100px;">
                </div>
              </div>
            </div>
          </div>
        </a>

        </div>
      </div>
    </div>






{% endblock %}
