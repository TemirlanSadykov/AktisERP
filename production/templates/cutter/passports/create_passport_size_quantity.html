{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-container">
    <h2 class="form-heading">{% trans "Assign Size Quantities for Passport" %} #{{ passport.order_number }}</h2>
    <form method="post" class="crud-form">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn create-btn">{% trans "Save Quantities" %}</button>
        </div>
    </form>
</div>
{% endblock %}
