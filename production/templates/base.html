<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Site Title</title>
    <!-- Add any additional head elements here (e.g., CSS files, meta tags) -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <!-- Navigation Bar -->
            <a href="{% url 'user_redirect' %}">Home</a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" style="border: none; background: none; cursor: pointer; color: blue; text-decoration: underline;">Logout</button>
            </form>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
        {% block extra_js %}{% endblock %}
    </main>

    <footer>

    </footer>
</body>
</html>
