{% extends "base.html" %}
{% load i18n %}

{% block content %}

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <button class="navbar-toggler" type="button" id="menu-toggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <h4 style="color: #232323; margin:auto;" class="navfont">{% trans 'Employee Dashboard' %}</h4>
  <div class="collapse navbar-collapse" id="navbarSupportedContent" style="display: inline;">
    <ul class="navbar-nav ml-auto mt-2 mt-lg-0 navres">
      <li class="nav-item dropdown" style="margin: 10px;">
        {{ request.user.username }}
      </li>
      <li class="nav-item dropdown">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
            <button type="submit" class="btn btn-primary">{% trans 'Logout' %}</button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<div class="clock-container">
  {% if request.user.userprofile.type != 0 %}
  <h1 class="clock-heading">{% trans 'Clock In/Out' %}</h1>
  <button id="clock-btn" class="clock-btn">
    {% if request.user.userprofile.status %}{% trans 'Clock Out' %}{% else %}{% trans 'Clock In' %}{% endif %}
  </button>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script>
  // Function to get location
  function getLocation(callback) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        callback({
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        });
      }, function(error) {
        alert("Unable to retrieve your location. Please check location settings.");
        callback(null);
      });
    } else {
      alert("Geolocation is not supported by this browser.");
      callback(null);
    }
  }
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
  // Function to get browser fingerprint and submit clock-in data
  async function clockInOut() {
    const fp = await FingerprintJS.load();
    const result = await fp.get();
    const fingerprint = result.visitorId;

    // Get location
    getLocation(function(location) {
      if (location) {
        // Send fingerprint and location to the backend
        fetch("{% url 'clock_in_out' %}", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie('csrftoken'),
          },
          body: JSON.stringify({
            fingerprint: fingerprint,
            latitude: location.latitude,
            longitude: location.longitude
          })
        }).then(response => {
          if (response.ok) {
            window.location.href = "{% url 'user_redirect' %}";
          } else {
            alert("Clock-in/out failed. Please try again.");
          }
        }).catch(error => {
          console.error("Error:", error);
          alert("Clock-in/out failed due to an error.");
        });
      }
    });
  }

  // Attach event listener to clock-in/out button
  document.getElementById("clock-btn").addEventListener("click", function() {
    clockInOut();
  });
</script>

{% endblock %}
