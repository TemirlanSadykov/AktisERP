{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block content %}
<style>
    /* Basic styling for inline text and table responsiveness */
    .cell-text {
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
    }
</style>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <button class="navbar-toggler" type="button" id="menu-toggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <h4 style="color: #232323; margin:auto;" class="navfont">{% trans "Manual Scan" %}</h4>
  <div class="collapse navbar-collapse" id="navbarSupportedContent" style="display: inline;">
    <ul class="navbar-nav ml-auto mt-2 mt-lg-0 navres">
      <li class="nav-item dropdown" style="margin: 10px;">{{ request.user.username }}</li>
      <li class="nav-item dropdown">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-primary">{% trans "Logout" %}</button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<div class="container maincontr" style="margin-top: 30px;">
  <h2 class="mb-4">{% trans "Manual Order Scanning" %}</h2>
  <form id="manual-scan-form">
    <!-- Dropdown for Client Orders -->
    <div class="form-group">
      <label for="client-order-select">{% trans "Select Client Order" %}</label>
      <select id="client-order-select" class="form-control">
        <option value="">{% trans "------" %}</option>
        {% for co in client_orders %}
          <option value="{{ co.id }}">{{ co.client.name }} - {{ co.order_number }}</option>
        {% endfor %}
      </select>
    </div>
    <!-- Dropdown for Orders -->
    <div class="form-group">
      <label for="order-select">{% trans "Select Order" %}</label>
      <select id="order-select" class="form-control">
        <option value="">{% trans "------" %}</option>
      </select>
    </div>
  </form>
  <!-- Container for the dynamic order table -->
  <div id="order-table-container" class="mt-4"></div>
</div>
<div id="loadingOverlay" style="
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;">
  <div class="spinner-border text-primary" role="status">
    <span class="sr-only">{% trans "Loading..." %}</span>
  </div>
</div>

<script>
function showLoading() {
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}
  
// Helper to get CSRF token.
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== "") {
    const cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + "=")) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

document.addEventListener("DOMContentLoaded", function() {
  const clientOrderSelect = document.getElementById("client-order-select");
  const orderSelect = document.getElementById("order-select");
  const orderTableContainer = document.getElementById("order-table-container");

  let activeOrderId = null;
  let orderTableData = null;
  let lastUpdatedCell = null; // Optional: to highlight recently updated cells

  // When a client order is chosen, fetch its related orders.
  clientOrderSelect.addEventListener("change", function() {
    const clientOrderId = clientOrderSelect.value;
    if (clientOrderId) {
      fetch(`/production/packer/ajax/get-orders/?client_order_id=${clientOrderId}`)
        .then(response => response.json())
        .then(data => {
          orderSelect.innerHTML = '<option value="">{% trans "------" %}</option>';
          orderTableContainer.innerHTML = "";
          data.orders.forEach(function(order) {
            const option = document.createElement("option");
            option.value = order.id;
            option.textContent = order.label;
            orderSelect.appendChild(option);
          });
        })
        .catch(error => console.error("Error fetching orders:", error));
    } else {
      orderSelect.innerHTML = '<option value="">{% trans "------" %}</option>';
      orderTableContainer.innerHTML = "";
    }
  });

  // When an order is chosen, fetch its order table data.
  orderSelect.addEventListener("change", function() {
    const orderId = orderSelect.value;
    if (orderId) {
      loadOrderTableData(orderId)
        .then(function(orderData) {
          initializeOrderTable(orderData);
        })
        .catch(function(err) {
          console.error("Error loading order table data:", err);
        });
    } else {
      orderTableContainer.innerHTML = "";
    }
  });

  // Function to fetch order table data from the server.
  function loadOrderTableData(orderId) {
    return fetch(`/production/packer/orders/get-order-table-data/${orderId}/`)
      .then(function(response) {
        if (!response.ok) {
          throw new Error("Network response was not ok");
        }
        return response.json();
      });
  }

  // Initialize the order table.
  // Also, build a mapping (sqMapping) from each SizeQuantity id (sqId) to {combo, size} and store production_complete info.
  function initializeOrderTable(orderData) {
    activeOrderId = orderData.order_id;
    orderTableData = {
      orderName: orderData.order_name,
      allSizes: orderData.all_sizes,
      rows: {},         // e.g. { "Color Fabrics": { required: {...}, scanned: {...} } }
      sq_ids: orderData.sq_ids,  // Mapping: orderTableData.sq_ids[combo][size] = sqId
      sqMapping: {},    // Mapping: sqId -> {combo, size}
      production_complete: orderData.production_complete  // Mapping: production_complete[combo][size]
    };
    for (var combo in orderData.pivot_data) {
      orderTableData.rows[combo] = {
        required: orderData.pivot_data[combo],
        scanned: {}
      };
      orderData.all_sizes.forEach(function(size) {
        var count = 0;
        if (orderData.packed_counts &&
            orderData.packed_counts[combo] &&
            orderData.packed_counts[combo][size]) {
          count = orderData.packed_counts[combo][size];
        }
        orderTableData.rows[combo].scanned[size] = count;
        // Build the mapping for this SizeQuantity id.
        var sqId = orderTableData.sq_ids[combo][size];
        orderTableData.sqMapping[sqId] = { combo: combo, size: size };
      });
    }
    renderOrderTable();
  }

  // Render the order table using the current orderTableData.
  function renderOrderTable() {
    if (!orderTableData) return;
    var html = '<div class="table-responsive"><table class="table table-bordered"><thead><tr>';
    html += '<th>' + orderTableData.orderName + '</th>';
    orderTableData.allSizes.forEach(function(size) {
      html += '<th>' + size + '</th>';
    });
    html += '</tr></thead><tbody>';
    
    for (var combo in orderTableData.rows) {
      html += '<tr><td>' + combo + '</td>';
      orderTableData.allSizes.forEach(function(size) {
        var scanned = orderTableData.rows[combo].scanned[size] || 0;
        var required = orderTableData.rows[combo].required[size] || 0;
        var sqId = orderTableData.sq_ids[combo][size];
        var cellContent = '';
        var tdStyle = '';
        
        // Retrieve the production_complete state for this cell.
        var prodComplete = (orderTableData.production_complete &&
                            orderTableData.production_complete[combo] &&
                            orderTableData.production_complete[combo][size]);
        
        // If the scanned value meets/exceeds the required value (and is nonzero)
        if (scanned > 0) {
          cellContent = '<span class="editable" data-sq-id="'+sqId+'">' + scanned + '</span>/' + required;
        } else {
          cellContent = '<input type="text" data-sq-id="'+sqId+'" style="width:50px;" placeholder="0" />/' + required;
        }
        
        // Always show the Complete button
        var buttonClass = 'btn';
        var buttonText = 'Завершить';
        var buttonDisabled = '';
        var extraStyle = '';
        
        if (prodComplete) {
          buttonClass += ' btn-success';
          buttonDisabled = 'disabled';
          buttonText = 'Завершен';
        } else if (scanned >= required && scanned > 0) {
          buttonClass += ' btn-success';
          extraStyle = 'style="margin-left:5px;"';
        } else {
          buttonClass += ' btn-secondary';  // Grey for partial/incomplete
          extraStyle = 'style="margin-left:5px;"';
        }
        
        cellContent += ` <button class="complete-button ${buttonClass}" data-sq-id="${sqId}" ${buttonDisabled} ${extraStyle}>${buttonText}</button>`;
        
        if (scanned >= required && scanned > 0) {
          tdStyle = ' style="background-color: #5ced73;"';
        }
                
        html += '<td' + tdStyle + '>' + cellContent + '</td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    orderTableContainer.innerHTML = html;
  }
                
  // Listen for changes on input fields (for new values).
  orderTableContainer.addEventListener('change', function(event) {
    if (event.target.tagName.toLowerCase() === 'input' &&
        !event.target.classList.contains('edited-input')) {
      const inputEl = event.target;
      const qtyStr = inputEl.value.trim();
      const qty = qtyStr !== "" ? parseInt(qtyStr, 10) : 0;
      if (qtyStr !== "" && (isNaN(qty) || qty < 0)) {
        return;
      }
      const sqId = inputEl.getAttribute('data-sq-id');
      const orderId = activeOrderId;
  
      const payload = {
        order_id: orderId,
        size_quantity_id: sqId,
        quantity: qty
      };
  
      fetch('/production/packer/ajax/orders/update-packed-quantity/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        if (data.success) {
          // Update the data model using the prebuilt mapping.
          const mapping = orderTableData.sqMapping[sqId];
          if (mapping) {
            orderTableData.rows[mapping.combo].scanned[mapping.size] = qty;
          }
          renderOrderTable();
        } else {
          alert('Failed to update: ' + data.message);
        }
      })
      .catch(error => {
        console.error('Error updating packed quantity:', error);
        alert('Error updating packed quantity: ' + error.message);
      });
    }
  });
          
  // Listen for double-click/tap on editable spans.
  orderTableContainer.addEventListener("dblclick", function(event) {
    if (event.target.classList.contains("editable")) {
      handleEditableAction(event.target);
    }
  });
  
  let lastTap = 0;
  orderTableContainer.addEventListener("touchend", function(event) {
    let currentTime = new Date().getTime();
    let tapLength = currentTime - lastTap;
    lastTap = currentTime;
    if (tapLength < 500 && tapLength > 0) {
      if (event.target.classList.contains("editable")) {
        event.preventDefault();
        handleEditableAction(event.target);
      }
    }
  });
  
  // Replace a span with an input field for editing.
  function handleEditableAction(span) {
    const originalValue = span.textContent.trim();
    const input = document.createElement("input");
    input.type = "text";
    input.value = originalValue;
    input.className = "edit-input edited-input";
    input.style.width = "50px";
    input.setAttribute("data-sq-id", span.getAttribute("data-sq-id"));
  
    span.parentNode.replaceChild(input, span);
    input.focus();
  
    let updateSubmitted = false;
    const submitUpdate = function() {
      if (updateSubmitted) return;
      updateSubmitted = true;
      updateScannedQuantity(input.getAttribute("data-sq-id"), input.value, originalValue);
    };
    input.addEventListener("blur", submitUpdate);
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        submitUpdate();
      }
    });
  }
          
  // Send updated scanned quantity via AJAX (for edited fields).
  function updateScannedQuantity(sqId, newValue, originalValue) {
    const orderId = activeOrderId;
    const qty = (newValue.trim() === "") ? 0 : parseInt(newValue, 10);
    const payload = {
      order_id: orderId,
      size_quantity_id: sqId,
      quantity: qty
    };
  
    fetch('/production/packer/ajax/orders/update-packed-quantity/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify(payload)
    })
    .then(response => {
      if (!response.ok) throw new Error("Network response was not ok");
      return response.json();
    })
    .then(data => {
      if (data.success) {
        const mapping = orderTableData.sqMapping[sqId];
        if (mapping) {
          orderTableData.rows[mapping.combo].scanned[mapping.size] = qty;
        }
        renderOrderTable();
      } else {
        alert("Failed to update: " + data.message);
        renderOrderTable();
      }
    })
    .catch(error => {
      console.error("Error updating scanned quantity:", error);
      alert("Error updating scanned quantity: " + error.message);
      renderOrderTable();
    });
  }
  
  // Listen for clicks on any "Complete" button.
  orderTableContainer.addEventListener('click', function(event) {
    if (event.target.classList.contains('complete-button')) {
      var button = event.target;
      var sqId = button.getAttribute('data-sq-id');
  
      // Determine if packed < required
      const mapping = orderTableData.sqMapping[sqId];
      const combo = mapping.combo;
      const size = mapping.size;
      const scanned = orderTableData.rows[combo].scanned[size] || 0;
      const required = orderTableData.rows[combo].required[size] || 0;
  
      if (scanned < required) {
        if (!confirm("Упакованое количество меньше требуемого. Вы уверены, что хотите завершить?")) {
          return;
        }
      }
  
      var payload = {
        size_quantity_id: sqId
      };
      showLoading();
      fetch('/production/packer/ajax/orders/complete-production/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        button.disabled = true;
        button.textContent = 'Завершен';
        hideLoading();
        if (!data.success) {
          alert('Warning: ' + data.message);
        }
      })
      .catch(error => {
        console.error('Error completing production:', error);
        alert('Error completing production: ' + error.message);
      });
    }
  });  
});
</script>
{% endblock %}
