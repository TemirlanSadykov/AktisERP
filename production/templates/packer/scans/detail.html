{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <button class="navbar-toggler" type="button" id="menu-toggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <h4 style="color: #232323; margin:auto;" class="navfont">{% trans "Scan" %}</h4>
  <div class="collapse navbar-collapse" id="navbarSupportedContent" style="display: inline;">
    <ul class="navbar-nav ml-auto mt-2 mt-lg-0 navres">
      <li class="nav-item dropdown" style="margin: 10px;">
        {{ request.user.username }}
      </li>
      <li class="nav-item dropdown">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-primary">{% trans 'Logout' %}</button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<div class="container clients-wrapper maincontr">
  <div class="clients-header">
    <span class="operation-text">{% trans "Scan Items" %}</span>
    <input type="text" id="barcode-input" autofocus style="padding: 8px;" placeholder="Ручной ввод"/>
  </div>
  
  <!-- Container for the dynamic order table -->
  <div id="order-table-container"></div>
</div>

<div class="modal fade" id="errorModal" tabindex="-1" role="dialog" aria-labelledby="errorModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="errorModalLabel">{% trans "Ошибка" %}</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="errorModalMessage">
        <!-- Error message will be displayed here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">{% trans "Закрыть" %}</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirmation Modal for switching orders -->
<div class="modal fade" id="confirmModal" tabindex="-1" role="dialog" aria-labelledby="confirmModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Confirmation</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="confirmModalMessage">
        <!-- Confirmation message will be inserted here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="confirmNoBtn" data-dismiss="modal">No</button>
        <button type="button" class="btn btn-primary" id="confirmYesBtn">Yes</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for required quantity reached -->
<div class="modal fade" id="reachedModal" tabindex="-1" role="dialog" aria-labelledby="reachedModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reachedModalLabel">Notice</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="reachedModalMessage">
        Required quantity reached for this SKU.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const barcodeInput = document.getElementById('barcode-input');

  let pivotSizes = [];
  let pivotRequired = {};
  let pivotPacked = {};
  let productionComplete = {};
  let sqIdMapping = {};
  let orderModel = null;
  let currentOrderId = null;
  let lastUpdatedCell = null;
  let currentPendingSKU = null;

  function buildPivotState(sizeQuantities) {
    pivotRequired = {};
    pivotPacked = {};
    productionComplete = {};
    sqIdMapping = {};
    const sizeSet = new Set();

    sizeQuantities.forEach(q => {
      const combo = q.color + ' ' + q.fabrics;
      sizeSet.add(q.size);

      if (!pivotRequired[combo]) {
        pivotRequired[combo] = {};
        pivotPacked[combo] = {};
        productionComplete[combo] = {};
        sqIdMapping[combo] = {};
      }

      pivotRequired[combo][q.size] = q.quantity;
      pivotPacked[combo][q.size] = q.packed || 0;
      productionComplete[combo][q.size] = q.production_complete || false;
      sqIdMapping[combo][q.size] = q.id;
    });

    try {
      pivotSizes = Array.from(sizeSet).sort((a, b) => parseInt(a) - parseInt(b));
    } catch {
      pivotSizes = Array.from(sizeSet).sort();
    }
  }

  function renderPivotTable() {
    if (!orderModel) return;

    let html = `<div class="table-responsive"><table class="table table-bordered"><thead><tr>`;
    html += `<th>${orderModel}</th>`;
    pivotSizes.forEach(size => { html += `<th>${size}</th>`; });
    html += `</tr></thead><tbody>`;

    Object.keys(pivotRequired).forEach(combo => {
      const rowComplete = pivotSizes.every(sz => (pivotPacked[combo][sz] || 0) >= (pivotRequired[combo][sz] || 0));
      html += `<tr${rowComplete ? ' style="background-color:#5ced73;"' : ''}><td>${combo}</td>`;

      pivotSizes.forEach(size => {
        const req = pivotRequired[combo][size] || 0;
        const pak = pivotPacked[combo][size] || 0;
        const isRed = lastUpdatedCell &&
                      lastUpdatedCell.combo === combo &&
                      lastUpdatedCell.size === size;
        const isComplete = productionComplete[combo][size];
        const sqId = sqIdMapping[combo][size];

        let tdStyle = '';
        if (pak >= req && pak > 0) tdStyle = 'background-color: #5ced73;';
        if (isRed) tdStyle += 'border: 3px solid red;';

        let content = `${pak}/${req}`;
        if (pak >= req && pak > 0) {
          content += isComplete
            ? ` <button class="complete-button btn btn-success btn-sm" data-sq-id="${sqId}" disabled>Completed</button>`
            : ` <button class="complete-button btn btn-success btn-sm" data-sq-id="${sqId}">Complete</button>`;
        }

        html += `<td style="${tdStyle}">${content}</td>`;
      });

      html += '</tr>';
    });

    html += '</tbody></table></div>';
    document.getElementById('order-table-container').innerHTML = html;
  }

  function processBarcode(confirmSwitch = false) {
    const sku = barcodeInput.value.trim();
    if (!sku) return barcodeInput.focus();

    const payload = confirmSwitch ? { confirm_switch: true } : {};
    fetch(`/production/packer/orders/update-packed-by-sku/${encodeURIComponent(sku)}/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        if (!currentOrderId || currentOrderId !== data.order_id) {
          currentOrderId = data.order_id;
          orderModel = data.model_name;
          lastUpdatedCell = null;
          buildPivotState(data.size_quantities);
        } else {
          const scanned = data.size_quantities.find(q => q.sku === data.scanned_sku);
          const combo = scanned.color + ' ' + scanned.fabrics;
          const size = scanned.size;
          pivotPacked[combo][size] = (pivotPacked[combo][size] || 0) + 1;
          lastUpdatedCell = { combo, size };
        }
        renderPivotTable();

        if (data.reached_required) {
          $('#reachedModal').modal('show');
        }
      } else if (data.switch_order) {
        currentPendingSKU = sku;
        document.getElementById('confirmModalMessage').textContent = data.message;
        $('#confirmModal').modal('show');
      } else {
        document.getElementById('errorModalMessage').textContent = data.message;
        $('#errorModal').modal('show');
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById('errorModalMessage').textContent = 'An unexpected error occurred.';
      $('#errorModal').modal('show');
    })
    .finally(() => {
      barcodeInput.value = '';
      barcodeInput.focus();
    });
  }

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      document.cookie.split(';').forEach(cookie => {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        }
      });
    }
    return cookieValue;
  }

  // Confirm order switch
  document.getElementById('confirmYesBtn').addEventListener('click', () => {
    if (currentPendingSKU) {
      barcodeInput.value = currentPendingSKU;
      processBarcode(true);
      currentPendingSKU = null;
    }
    $('#confirmModal').modal('hide');
  });

  document.getElementById('confirmNoBtn').addEventListener('click', () => {
    currentPendingSKU = null;
    $('#confirmModal').modal('hide');
    barcodeInput.focus();
  });

  barcodeInput.addEventListener('change', () => processBarcode(false));

  // Completion button logic
  document.getElementById('order-table-container').addEventListener('click', function (event) {
    if (event.target.classList.contains('complete-button')) {
      const sqId = event.target.getAttribute('data-sq-id');
      fetch('/production/packer/ajax/orders/complete-production/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ size_quantity_id: sqId })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          event.target.disabled = true;
          event.target.textContent = 'Completed';
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(error => {
        console.error('Completion error:', error);
        alert('Error completing production');
      });
    }
  });

  $('#errorModal').on('hidden.bs.modal', () => barcodeInput.focus());
});
</script>
{% endblock %}
