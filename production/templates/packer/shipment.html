{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <button class="navbar-toggler" type="button" id="menu-toggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <h4 style="color: #232323; margin:auto;" class="navfont">{% trans "Scan" %}</h4>
  <div class="collapse navbar-collapse" id="navbarSupportedContent" style="display: inline;">
    <ul class="navbar-nav ml-auto mt-2 mt-lg-0 navres">
      <li class="nav-item dropdown" style="margin: 10px;">
        {{ request.user.username }}
      </li>
      <li class="nav-item dropdown">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-primary">{% trans 'Logout' %}</button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<div class="container clients-wrapper maincontr">
  <div class="clients-header">
    <span class="operation-text">{% trans "Scan Items" %}</span>
    <input type="text" id="barcode-input" autofocus style="padding: 8px;" placeholder="Ручной ввод"/>
  </div>
  
  <!-- Container for the dynamic order table -->
  <div id="order-table-container"></div>
</div>

<div class="modal fade" id="errorModal" tabindex="-1" role="dialog" aria-labelledby="errorModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="errorModalLabel">{% trans "Ошибка" %}</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="errorModalMessage">
        <!-- Error message will be displayed here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">{% trans "Закрыть" %}</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirmation Modal for switching orders -->
<div class="modal fade" id="confirmModal" tabindex="-1" role="dialog" aria-labelledby="confirmModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Confirmation</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="confirmModalMessage">
        <!-- Confirmation message will be inserted here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="confirmNoBtn" data-dismiss="modal">No</button>
        <button type="button" class="btn btn-primary" id="confirmYesBtn">Yes</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for required quantity reached -->
<div class="modal fade" id="reachedModal" tabindex="-1" role="dialog" aria-labelledby="reachedModalLabel" aria-hidden="true" data-backdrop="false">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reachedModalLabel">Notice</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="reachedModalMessage">
        Required quantity reached for this SKU.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
      var barcodeInput = document.getElementById('barcode-input');
      // Global variable to store the SKU that triggered the order switch.
      var currentPendingSKU = null;
  
      // Render the order table with model name and size quantities.
      function renderOrderTable(data) {
          var html = '<h4>' + data.model_name + '</h4>';
          html += '<div class="table-responsive"><table class="table table-bordered"><thead><tr>';
          html += '<th>SKU</th>';
          html += '<th>Color</th>';
          html += '<th>Fabrics</th>';
          html += '<th>Size</th>';
          html += '<th>Quantity</th>';
          html += '<th>Packed</th>';
          html += '</tr></thead><tbody>';
          
          data.size_quantities.forEach(function(qty) {
              // Row green if packed count is equal or greater than quantity.
              var isComplete = (qty.packed >= qty.quantity);
              var rowStyle = isComplete ? ' style="background-color: #5ced73;"' : '';
              html += '<tr' + rowStyle + '>';
              html += '<td>' + qty.sku + '</td>';
              html += '<td>' + qty.color + '</td>';
              html += '<td>' + qty.fabrics + '</td>';
              html += '<td>' + qty.size + '</td>';
              html += '<td>' + qty.quantity + '</td>';
              // If this cell is the scanned one, add a red border.
              var packedCellStyle = data.scanned_sku === qty.sku ? ' style="border: 3px solid red;"' : '';
              html += '<td' + packedCellStyle + '>' + qty.packed + '</td>';
              html += '</tr>';
          });
          
          html += '</tbody></table></div>';
          document.getElementById('order-table-container').innerHTML = html;
      }
  
      // Process the barcode input. Optionally pass a flag to confirm switching orders.
      function processBarcode(confirmSwitch) {
          var barcode = barcodeInput.value.trim();
          if (!barcode) {
              barcodeInput.focus();
              return;
          }
          var payload = {};
          if (confirmSwitch) {
              payload.confirm_switch = true;
          }
          fetch('/production/packer/orders/update-packed-by-sku/' + encodeURIComponent(barcode) + '/', {
              method: 'POST',
              headers: {
                  'X-CSRFToken': getCookie('csrftoken'),
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
          })
          .then(function(response) { return response.json(); })
          .then(function(data) {
              if (data.success) {
                  renderOrderTable(data);
                  // If the required quantity for the scanned SKU is reached, show the notice modal.
                  if (data.reached_required) {
                      $('#reachedModal').modal('show');
                  }
              } else if (data.switch_order) {
                  // If a different order is detected, prompt for confirmation.
                  currentPendingSKU = barcode; // Save the pending SKU.
                  document.getElementById('confirmModalMessage').textContent = data.message;
                  $('#confirmModal').modal('show');
              } else {
                  document.getElementById('errorModalMessage').textContent = data.message;
                  $('#errorModal').modal('show');
              }
          })
          .catch(function(error) {
              console.error('Error updating packed count:', error);
              document.getElementById('errorModalMessage').textContent = 'An unexpected error occurred.';
              $('#errorModal').modal('show');
          });
          barcodeInput.value = '';
          barcodeInput.focus();
      }
  
      // Listen for barcode input changes.
      barcodeInput.addEventListener('change', function() {
          processBarcode(false);
      });
  
      // When the user confirms switching orders.
      document.getElementById('confirmYesBtn').addEventListener('click', function() {
          if (currentPendingSKU) {
              barcodeInput.value = currentPendingSKU;
              processBarcode(true);
              currentPendingSKU = null;
          }
          $('#confirmModal').modal('hide');
      });
  
      // If the user clicks "No", simply hide the modal.
      document.getElementById('confirmNoBtn').addEventListener('click', function() {
          currentPendingSKU = null;
          $('#confirmModal').modal('hide');
          barcodeInput.focus();
      });
  
      // Utility function to get CSRF token.
      function getCookie(name) {
          let cookieValue = null;
          if (document.cookie && document.cookie !== '') {
              const cookies = document.cookie.split(';');
              for (let i = 0; i < cookies.length; i++) {
                  const cookie = cookies[i].trim();
                  if (cookie.substring(0, name.length + 1) === (name + '=')) {
                      cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                      break;
                  }
              }
          }
          return cookieValue;
      }
  
      // When error modal closes, refocus barcode input.
      $('#errorModal').on('hidden.bs.modal', function () {
          barcodeInput.focus();
      });
  });
</script>
{% endblock %}
