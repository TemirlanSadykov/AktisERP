{% extends 'base.html' %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Edit Operation: %(name)s" %}{{ operation.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Update" %}</button>
  </form>
  <a href="{% url 'operation_detail' operation.pk %}">{% trans "Cancel" %}</a>
{% endblock %}
