{% extends 'base.html' %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Are you sure you want to delete '%(name)s'?" %}{{ operation.name }}</h2>
  <form method="post">
    {% csrf_token %}
    <button type="submit">{% trans "Confirm Delete" %}</button>
  </form>
  <a href="{% url 'operation_detail' operation.pk %}">{% trans "Cancel" %}</a>
  <a href="{% url 'operation_list' %}">{% trans "Back" %}</a>
{% endblock %}
