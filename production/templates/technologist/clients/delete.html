{% extends "base.html" %}

{% block content %}
  <h2>{% trans "Confirm Delete" %}</h2>
  <p>{% trans "Are you sure you want to delete the client '%(name)s'?" %}{{ client.name }}</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">{% trans "Confirm Delete" %}</button>
  </form>
  
  <a href="{% url 'client_detail' client.pk %}">{% trans "Cancel" %}</a> |
  <a href="{% url 'client_list' %}">{% trans "Back" %}</a>
{% endblock %}
