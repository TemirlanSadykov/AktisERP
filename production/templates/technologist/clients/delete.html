{% extends "base.html" %}

{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the client "{{ client.name }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  
  <a href="{% url 'client_detail' client.pk %}">Cancel</a> |
  <a href="{% url 'client_list' %}">Back to Client List</a>
{% endblock %}
