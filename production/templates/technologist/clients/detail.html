{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Client Details: %(name)s" %}{{ client.name }}</h2>
  <p>{% trans "Contact Info:" %} {{ client.contact_info }}</p>
  <a href="{% url 'client_edit' client.pk %}">{% trans "Edit" %}</a> |
  <a href="{% url 'client_delete' client.pk %}">{% trans "Delete" %}</a> |
  <a href="{% url 'client_list' %}">{% trans "Back" %}</a>
{% endblock %}
