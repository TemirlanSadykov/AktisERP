{% extends "base.html" %}

{% block content %}
  <h2>{% trans "Edit Client: %(name)s" %}{{ client.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Update" %}</button>
  </form>
  <a href="{% url 'client_detail' client.pk %}">{% trans "Cancel" %}</a> |
  <a href="{% url 'client_list' %}">{% trans "Back" %}</a>
{% endblock %}
