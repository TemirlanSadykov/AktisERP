{% extends "base.html" %}

{% block content %}
  <h2>Edit Client: {{ client.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Client</button>
  </form>
  <a href="{% url 'client_detail' client.pk %}">Cancel</a> |
  <a href="{% url 'client_list' %}">Back to Client List</a>
{% endblock %}
