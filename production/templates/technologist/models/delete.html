{% extends "base.html" %}

{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the model "{{ model.name }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  
  <a href="{% url 'model_detail' model.pk %}">Cancel</a> |
  <a href="{% url 'model_list' %}">Back to Model List</a>
{% endblock %}
