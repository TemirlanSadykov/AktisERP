{% extends "base.html" %}

{% block content %}
  <h2>Edit Model: {{ model.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Model</button>
  </form>
  <a href="{% url 'model_detail' model.pk %}">Cancel</a> |
  <a href="{% url 'model_list' %}">Back to Model List</a>
{% endblock %}
