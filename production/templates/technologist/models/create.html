{% extends "base.html" %}

{% block content %}
  <h2>{% trans "Create New Model" %}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Create" %}</button>
  </form>
  <a href="{% url 'model_list' %}">{% trans "Back" %}</a>
{% endblock %}

{% block extra_js %}
  {{ form.media }}
{% endblock %}
