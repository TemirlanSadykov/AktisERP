{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <form method="post">
    {% csrf_token %}
    <p>
      {% trans "Are you sure you want to delete the passport for" %} "{{ passport.order.client.name }}"?
    </p>
    <button type="submit">{% trans "Confirm Delete" %}</button>
    <a href="{% url 'passport_list' %}">{% trans "Cancel" %}</a>
  </form>
{% endblock %}
