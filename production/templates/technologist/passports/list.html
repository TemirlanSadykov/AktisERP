{% extends "base.html" %}

{% block content %}
  <p><a href="{% url 'passport_create' %}">{% trans "Create Passport" %}</a></p>
  {% for passport in passports %}
    <p style="color: {{ passport.is_completed|yesno:'green,red' }};">
      <a href="{% url 'passport_detail' passport.pk %}" style="color: inherit;">
        {% trans "Passport for" %} {{ passport.order.client.name }} - {% trans "Model" %}: {{ passport.order.model.name }}
      </a>
    </p>
  {% endfor %}
{% endblock %}
