{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the roll "{{ roll.name }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  
  <a href="{% url 'roll_detail' roll.pk %}">Cancel</a>
{% endblock %}
