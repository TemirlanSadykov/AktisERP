{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>Edit Roll: {{ roll.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Roll</button>
  </form>
  <a href="{% url 'roll_detail' roll.pk %}">Cancel</a> |
  <a href="{% url 'roll_list' %}">Back to Roll List</a>
{% endblock %}
