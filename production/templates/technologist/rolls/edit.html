{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Edit Roll:" %} {{ roll.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Update" %}</button>
  </form>
  <a href="{% url 'roll_detail' roll.pk %}">{% trans "Cancel" %}</a> |
  <a href="{% url 'roll_list' %}">{% trans "Back" %}</a>
{% endblock %}
