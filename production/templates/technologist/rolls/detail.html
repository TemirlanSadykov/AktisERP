{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Roll Details:" %} {{ roll.name }}</h2>
  <p><strong>{% trans "Color:" %}</strong> {{ roll.color }}</p>
  <p><strong>{% trans "Fabrics:" %}</strong> {{ roll.fabrics }}</p>

  <a href="{% url 'roll_edit' roll.pk %}">{% trans "Edit" %}</a> |
  <a href="javascript:;" onclick="confirmDelete()">{% trans "Delete" %}</a> |
  <a href="{% url 'roll_list' %}">{% trans "Back" %}</a>

  <form id="deleteForm" action="{% url 'roll_delete' roll.pk %}" method="post" style="display:none;">
    {% csrf_token %}
  </form>

  <script>
    function confirmDelete() {
      if (confirm("{% trans 'Are you sure you want to delete this roll?' %}")) {
        document.getElementById('deleteForm').submit();
      }
    }
  </script>
{% endblock %}
