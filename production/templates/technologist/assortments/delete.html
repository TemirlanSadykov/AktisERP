{% extends "base.html" %}

{% block content %}
  <h2>Confirm Delete</h2>
  <p>Are you sure you want to delete the assortment "{{ assortment.name }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  
  <a href="{% url 'assortment_detail' assortment.pk %}">Cancel</a> |
  <a href="{% url 'assortment_list' %}">Back to Assortment List</a>
{% endblock %}
