{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Edit Assortment: %(name)s" %}{{ assortment.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Update" %}</button>
  </form>
  <a href="{% url 'assortment_detail' assortment.pk %}">{% trans "Cancel" %}</a> |
  <a href="{% url 'assortment_list' %}">{% trans "Back" %}</a>
{% endblock %}
