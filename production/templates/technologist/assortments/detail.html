{% extends "base.html" %}
{% load i18n %}
{% block content %}
  <h2>{% trans "Assortment Details: %(name)s" %}{{ assortment.name }}</h2>

  <a href="{% url 'assortment_edit' assortment.pk %}">{% trans "Edit" %}</a> |
  <a href="javascript:;" onclick="confirmDelete()">{% trans "Delete" %}</a> |
  <a href="{% url 'assortment_list' %}">{% trans "Back" %}</a>

  <form id="deleteForm" action="{% url 'assortment_delete' assortment.pk %}" method="post" style="display:none;">
    {% csrf_token %}
  </form>

  <script>
    function confirmDelete() {
      if (confirm("{% trans 'Are you sure you want to delete this assortment?' %}")) {
        document.getElementById('deleteForm').submit();
      }
    }
  </script>
{% endblock %}
