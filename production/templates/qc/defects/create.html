{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-container">
  <h2 class="form-heading">{% trans "Create New Defect" %}</h2>
  <form method="post" class="crud-form">
    {% csrf_token %}
    <div class="form-group">
      {{ form.as_p }}
    </div>
    <div class="form-actions">
      <button type="submit" class="btn create-btn">{% trans "Create" %}</button>
      <a href="{% url 'order_detail_qc' order.id %}" class="btn back-btn">{% trans "Back to Order" %}</a>
    </div>
  </form>
</div>
{% endblock %}
